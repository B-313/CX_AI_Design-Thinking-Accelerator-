<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Design Accelerator · Pfizer Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --pfizer-blue: #0093D0;
  --pfizer-dark: #003087;
  --pfizer-light: #E8F4FB;
  --pfizer-mid: #CCE8F5;
  --white: #FFFFFF;
  --grey-100: #F7F9FC;
  --grey-200: #EEF2F7;
  --grey-300: #D8E2EE;
  --grey-400: #A8BAD0;
  --grey-600: #5A7290;
  --grey-800: #1E3A5F;
  --text: #1A2E4A;
  --text-soft: #4A6280;
  --green: #00A651;
  --orange: #FF6B00;
  --red: #D32F2F;
  --shadow-sm: 0 1px 4px rgba(0,48,135,0.06);
  --shadow-md: 0 4px 20px rgba(0,48,135,0.10);
  --shadow-lg: 0 8px 40px rgba(0,48,135,0.14);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --font: 'Source Sans 3', sans-serif;
  --font-display: 'Nunito', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--grey-100);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
}

/* ── TOP NAV ── */
.topnav {
  width: 100%;
  background: var(--white);
  border-bottom: 1px solid var(--grey-300);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.pfizer-pill {
  background: var(--pfizer-blue);
  color: var(--white);
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 15px;
  padding: 5px 14px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}

.nav-divider { width: 1px; height: 22px; background: var(--grey-300); }

.nav-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 15px;
  color: var(--grey-800);
}

.nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

.nav-badge {
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--pfizer-light);
  color: var(--pfizer-blue);
  border: 1px solid var(--pfizer-mid);
}

/* ── PIPELINE STRIP ── */
.pipeline-strip {
  width: 100%;
  max-width: 820px;
  margin: 24px auto 0;
  padding: 0 16px;
}

.pipeline-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--grey-300);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 0;
}

.pipeline-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex: 1;
  position: relative;
  cursor: default;
}

.pipeline-step:not(:last-child)::after {
  content: '';
  position: absolute;
  right: 0;
  top: 18px;
  width: calc(50% - 20px);
  height: 2px;
  background: var(--grey-300);
  transition: background 0.4s;
}

.pipeline-step:not(:first-child)::before {
  content: '';
  position: absolute;
  left: 0;
  top: 18px;
  width: calc(50% - 20px);
  height: 2px;
  background: var(--grey-300);
  transition: background 0.4s;
}

.pipeline-step.done::after,
.pipeline-step.done::before,
.pipeline-step.done + .pipeline-step::before { background: var(--pfizer-blue); }

.pipeline-step.active::before { background: var(--pfizer-blue); }

.step-circle {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  background: var(--grey-200);
  border: 2px solid var(--grey-300);
  transition: all 0.4s ease;
  position: relative;
  z-index: 1;
}

.pipeline-step.done .step-circle {
  background: var(--pfizer-blue);
  border-color: var(--pfizer-blue);
  color: white;
  box-shadow: 0 0 0 4px var(--pfizer-mid);
}

.pipeline-step.active .step-circle {
  background: var(--pfizer-light);
  border-color: var(--pfizer-blue);
  color: var(--pfizer-blue);
  box-shadow: 0 0 0 4px rgba(0,147,208,0.15);
  animation: activePulse 2s ease-in-out infinite;
}

@keyframes activePulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(0,147,208,0.15); }
  50% { box-shadow: 0 0 0 6px rgba(0,147,208,0.25); }
}

.step-label {
  font-size: 10px;
  font-weight: 600;
  text-align: center;
  color: var(--grey-400);
  letter-spacing: 0.03em;
  line-height: 1.2;
  max-width: 70px;
  transition: color 0.4s;
}

.pipeline-step.done .step-label { color: var(--pfizer-blue); }
.pipeline-step.active .step-label { color: var(--pfizer-dark); }

/* running animation */
.step-spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--pfizer-mid);
  border-top-color: var(--pfizer-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  position: absolute;
  bottom: -4px; right: -4px;
  display: none;
  background: white;
}

.pipeline-step.running .step-spinner { display: block; }
.pipeline-step.running .step-circle {
  background: var(--pfizer-light);
  border-color: var(--pfizer-blue);
  color: var(--pfizer-blue);
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── CHAT WRAPPER ── */
.chat-wrapper {
  width: 100%;
  max-width: 820px;
  margin: 16px auto 0;
  padding: 0 16px 32px;
  display: flex;
  flex-direction: column;
  flex: 1;
}

/* ── MESSAGES ── */
.messages {
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-height: 100px;
}

/* Bot message */
.bot-msg {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  animation: msgIn 0.3s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.bot-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pfizer-blue), var(--pfizer-dark));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,147,208,0.3);
}

.bot-body { flex: 1; display: flex; flex-direction: column; gap: 6px; }

.bot-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--pfizer-blue);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.bot-bubble {
  background: var(--white);
  border: 1px solid var(--grey-300);
  border-radius: 4px 18px 18px 18px;
  padding: 14px 18px;
  font-size: 15px;
  line-height: 1.65;
  color: var(--text);
  box-shadow: var(--shadow-sm);
  max-width: 640px;
}

.bot-bubble strong { color: var(--pfizer-dark); }

.bot-bubble p + p { margin-top: 8px; }

/* User message */
.user-msg {
  display: flex;
  flex-direction: row-reverse;
  gap: 12px;
  align-items: flex-start;
  animation: msgIn 0.3s ease;
}

.user-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--grey-200);
  border: 2px solid var(--grey-300);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.user-bubble {
  background: linear-gradient(135deg, var(--pfizer-blue), var(--pfizer-dark));
  color: var(--white);
  border-radius: 18px 4px 18px 18px;
  padding: 13px 18px;
  font-size: 15px;
  line-height: 1.6;
  max-width: 580px;
  box-shadow: 0 4px 14px rgba(0,147,208,0.25);
}

/* Agent activity card */
.agent-activity {
  background: var(--pfizer-light);
  border: 1px solid var(--pfizer-mid);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
  animation: msgIn 0.3s ease;
}

.activity-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--white);
  border: 1.5px solid var(--pfizer-mid);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.activity-text { flex: 1; }
.activity-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--pfizer-dark);
  margin-bottom: 2px;
}
.activity-detail { font-size: 12px; color: var(--grey-600); }

.activity-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  flex-shrink: 0;
}
.status-running { background: var(--pfizer-mid); color: var(--pfizer-dark); }
.status-done { background: rgba(0,166,81,0.12); color: var(--green); }

.dot-spinner {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--pfizer-blue);
  animation: dotPulse 1.2s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* Result card */
.result-card {
  background: var(--white);
  border: 1px solid var(--grey-300);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-top: 10px;
  box-shadow: var(--shadow-sm);
}

.result-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--grey-400);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}

.result-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid var(--grey-200);
  font-size: 13.5px;
  line-height: 1.4;
  color: var(--text-soft);
}
.result-row:last-child { border-bottom: none; }
.result-row .ri { flex-shrink: 0; font-size: 14px; margin-top: 1px; }
.result-row .rt { flex: 1; }
.result-row .rt strong { color: var(--text); font-weight: 600; }

.score-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  margin-top: 10px;
}
.score-pill.good { background: rgba(0,166,81,0.1); color: var(--green); }
.score-pill.ok { background: rgba(255,107,0,0.1); color: var(--orange); }
.score-pill.bad { background: rgba(211,47,47,0.1); color: var(--red); }

/* Quick reply chips */
.quick-replies {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 12px;
}

.qr-chip {
  background: var(--white);
  border: 1.5px solid var(--pfizer-blue);
  color: var(--pfizer-blue);
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s ease;
  font-family: var(--font);
}
.qr-chip:hover {
  background: var(--pfizer-blue);
  color: var(--white);
  box-shadow: 0 4px 12px rgba(0,147,208,0.3);
  transform: translateY(-1px);
}

.qr-chip.primary {
  background: var(--pfizer-blue);
  color: var(--white);
}
.qr-chip.primary:hover {
  background: var(--pfizer-dark);
  border-color: var(--pfizer-dark);
}

/* Typing */
.typing-bubble {
  background: var(--white);
  border: 1px solid var(--grey-300);
  border-radius: 4px 18px 18px 18px;
  padding: 14px 18px;
  display: inline-flex;
  gap: 5px;
  align-items: center;
  box-shadow: var(--shadow-sm);
}
.typing-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--grey-400);
  animation: typingBounce 1.4s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%,60%,100% { transform: translateY(0); background: var(--grey-400); }
  30% { transform: translateY(-6px); background: var(--pfizer-blue); }
}

/* ── INPUT ── */
.input-section {
  width: 100%;
  max-width: 820px;
  margin: 0 auto;
  padding: 0 16px 24px;
  position: sticky;
  bottom: 0;
  background: linear-gradient(to top, var(--grey-100) 80%, transparent);
  padding-top: 16px;
}

.input-card {
  background: var(--white);
  border-radius: 24px;
  border: 1.5px solid var(--grey-300);
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: flex-end;
  padding: 12px 12px 12px 20px;
  gap: 10px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-card:focus-within {
  border-color: var(--pfizer-blue);
  box-shadow: 0 0 0 4px rgba(0,147,208,0.12), var(--shadow-md);
}

#userInput {
  flex: 1;
  border: none; outline: none;
  font-family: var(--font);
  font-size: 15px;
  color: var(--text);
  background: none;
  resize: none;
  max-height: 120px;
  min-height: 24px;
  line-height: 1.5;
}
#userInput::placeholder { color: var(--grey-400); }

.send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--pfizer-blue);
  border: none;
  color: var(--white);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,147,208,0.35);
}
.send-btn:hover { background: var(--pfizer-dark); transform: scale(1.06); }
.send-btn:disabled { background: var(--grey-300); box-shadow: none; cursor: not-allowed; transform: none; }

.input-hint {
  text-align: center;
  font-size: 11px;
  color: var(--grey-400);
  margin-top: 8px;
  letter-spacing: 0.02em;
}

/* ── DIVIDER ── */
.stage-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 8px 0;
}
.stage-divider::before, .stage-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--grey-200);
}
.stage-label {
  font-size: 11px; font-weight: 700;
  color: var(--grey-400); text-transform: uppercase;
  letter-spacing: 0.08em; white-space: nowrap;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 99px; }

/* ── COMPLETE CARD ── */
.complete-banner {
  background: linear-gradient(135deg, var(--pfizer-dark), var(--pfizer-blue));
  border-radius: var(--radius);
  padding: 20px 24px;
  color: white;
  display: flex; align-items: center; gap: 16px;
  box-shadow: var(--shadow-lg);
  animation: msgIn 0.4s ease;
}
.complete-banner .icon { font-size: 36px; }
.complete-banner h3 { font-family: var(--font-display); font-weight: 800; font-size: 18px; margin-bottom: 4px; }
.complete-banner p { font-size: 14px; opacity: 0.85; }

</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="nav-logo">
    <div class="pfizer-pill">Pfizer</div>
    <div class="nav-divider"></div>
    <div class="nav-title">Web Design Accelerator</div>
  </div>
  <div class="nav-right">
    <span class="nav-badge" id="navBadge">Getting started</span>
  </div>
</nav>

<!-- PIPELINE STRIP -->
<div class="pipeline-strip">
  <div class="pipeline-card">
    <div class="pipeline-step active" id="ps-0">
      <div class="step-circle">🧭<div class="step-spinner"></div></div>
      <div class="step-label">Brief Capture</div>
    </div>
    <div class="pipeline-step" id="ps-1">
      <div class="step-circle">🧩<div class="step-spinner"></div></div>
      <div class="step-label">Prompt Build</div>
    </div>
    <div class="pipeline-step" id="ps-2">
      <div class="step-circle">🛡️<div class="step-spinner"></div></div>
      <div class="step-label">Compliance</div>
    </div>
    <div class="pipeline-step" id="ps-3">
      <div class="step-circle">✍️<div class="step-spinner"></div></div>
      <div class="step-label">Grammar &amp; Brand</div>
    </div>
    <div class="pipeline-step" id="ps-4">
      <div class="step-circle">🏆<div class="step-spinner"></div></div>
      <div class="step-label">Final Review</div>
    </div>
  </div>
</div>

<!-- CHAT WRAPPER -->
<div class="chat-wrapper">
  <div class="messages" id="messages"></div>
</div>

<!-- INPUT -->
<div class="input-section">
  <div class="input-card">
    <textarea id="userInput" rows="1" placeholder="Type your message here…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
</div>

<script>
// ═══════════════════════════════════════════════
//  AGENT DEFINITIONS
// ═══════════════════════════════════════════════
const AGENTS = [
  {
    id: 'guide',
    label: 'Brief Capture',
    emoji: '🧭',
    activityText: 'Analysing your project context…',
    systemPrompt: `You are a friendly, professional assistant for Pfizer's Web Design Accelerator — a tool that helps web teams build brand-compliant, accessible digital experiences.

Your job: Warmly greet the user, then guide them through sharing their web design brief by asking focused questions across 2-3 short exchanges.

Collect: (1) page/site type, (2) target audience, (3) brand/design system notes, (4) compliance or accessibility requirements.

Rules:
- Be warm, clear, and concise — like a great UX colleague
- One or two questions per message max
- After 2-3 exchanges, when you have enough info, summarise the brief warmly and say you're now "handing this to our pipeline to build, check, and finalise your delivery"
- Never mention "agents", "AI models", or technical pipeline details to the user
- Max 100 words per reply
- End your summary message with the exact phrase: ##BRIEF_READY##`
  },
  {
    id: 'prompt',
    label: 'Prompt Builder',
    emoji: '🧩',
    activityText: 'Structuring your brief into an optimised prompt…',
    systemPrompt: `You are a Prompt Builder in a web design AI pipeline.

Given the user brief, produce a clean structured prompt with sections: Goal, Audience, Components, Brand Rules, Compliance Flags, Output Format.

Then write a short friendly message (2-3 sentences) to the user telling them their brief has been structured and is now being checked for compliance — in plain language, no technical jargon.

Format:
STRUCTURED_PROMPT:
[the structured prompt in a code block]

USER_MESSAGE:
[2-3 warm, plain-language sentences for the user]`
  },
  {
    id: 'compliance',
    label: 'Compliance Check',
    emoji: '🛡️',
    activityText: 'Running WCAG, GDPR and brand compliance checks…',
    systemPrompt: `You are a Compliance Checker for Pfizer web projects.

Review the structured prompt for: WCAG 2.1 AA, GDPR/cookies, brand consistency, regulatory considerations.

Reply in this exact format:

CHECKS:
✅ [check name]: [1 line why it passes]
⚠️ [check name]: [issue + fix]
❌ [check name]: [violation + required fix]

SCORE: [number]/100

USER_MESSAGE:
[2-3 friendly sentences summarising compliance results and what's happening next — no jargon]`
  },
  {
    id: 'grammar',
    label: 'Grammar & Brand',
    emoji: '✍️',
    activityText: 'Checking copy quality and Pfizer brand voice…',
    systemPrompt: `You are a Grammar and Brand Voice checker for Pfizer digital content.

Review the brief/copy for grammar, Pfizer brand voice alignment, readability, inclusive language, and tone.

Reply in this exact format:

GRAMMAR_ISSUES:
[list any fixes, or "None found"]

BRAND_SCORE: [number]/100
READABILITY: [grade level]
TOP_SUGGESTIONS:
1. [suggestion]
2. [suggestion]
3. [suggestion]

USER_MESSAGE:
[2-3 warm sentences telling the user the grammar and brand check is done and what's next]`
  },
  {
    id: 'reviewer',
    label: 'Final Review',
    emoji: '🏆',
    activityText: 'Compiling final delivery report…',
    systemPrompt: `You are the Final Reviewer for Pfizer's Web Design Accelerator pipeline.

Produce a concise final delivery report using all previous outputs.

Reply in this exact format:

SUMMARY: [2 sentences on readiness]

PIPELINE_RESULTS:
✅/⚠️/❌ Brief Capture: [status]
✅/⚠️/❌ Prompt Build: [status]
✅/⚠️/❌ Compliance: [status]
✅/⚠️/❌ Grammar & Brand: [status]

OVERALL_SCORE: [number]/100

ACTION_ITEMS:
1. [item]
2. [item]
3. [item]

VERDICT: [READY FOR LAUNCH or REQUIRES REVISIONS]

USER_MESSAGE:
[3 warm sentences: congratulate, summarise readiness, tell them what to do next. If revisions needed, be encouraging.]`
  }
];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let stage = 0; // 0=guide collecting, 1-4=background agents
let isLoading = false;
let conversationHistory = []; // full guide conversation
let pipelineData = {};
let briefReady = false;

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    botGreeting();
  }, 400);
});

function botGreeting() {
  addBotMessage(`👋 Hi there! I'm your <strong>Web Design Accelerator</strong> — here to take your project from brief to delivery-ready in minutes.

I'll ask you a few quick questions, then our pipeline will handle the structure, compliance checks, and final review automatically.

<strong>To start: what type of page or site are you building today?</strong> For example, a landing page, product hub, patient portal, or something else entirely.`, [
    { label: '🏥 Patient Portal', text: 'A patient portal for healthcare information' },
    { label: '💊 Product Page', text: 'A pharmaceutical product information page' },
    { label: '🌐 Corporate Site', text: 'A corporate website or microsite' },
    { label: '📋 Campaign Page', text: 'A marketing campaign landing page' }
  ]);
}

// ═══════════════════════════════════════════════
//  MESSAGE RENDERING
// ═══════════════════════════════════════════════
function addBotMessage(html, quickReplies = []) {
  const msgs = document.getElementById('messages');

  const div = document.createElement('div');
  div.className = 'bot-msg';
  div.innerHTML = `
    <div class="bot-avatar">✦</div>
    <div class="bot-body">
      <div class="bot-name">Pfizer Accelerator</div>
      <div class="bot-bubble">${html}${quickReplies.length ? renderQRs(quickReplies) : ''}</div>
    </div>
  `;
  msgs.appendChild(div);
  scrollToBottom();
}

function renderQRs(qrs) {
  return `<div class="quick-replies">${qrs.map((q,i) =>
    `<button class="qr-chip ${i===0&&qrs.length>3?'primary':''}" onclick="useQR('${q.text.replace(/'/g,"\\'")}',this)">${q.label}</button>`
  ).join('')}</div>`;
}

function useQR(text, btn) {
  // disable all chips in this group
  btn.closest('.quick-replies').querySelectorAll('.qr-chip').forEach(b => b.disabled = true);
  addUserMessage(text);
  handleUserInput(text);
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'user-msg';
  div.innerHTML = `
    <div class="user-avatar">👤</div>
    <div class="user-bubble">${escHtml(text)}</div>
  `;
  msgs.appendChild(div);
  scrollToBottom();
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'bot-msg';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="bot-avatar">✦</div>
    <div class="bot-body">
      <div class="bot-name">Pfizer Accelerator</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  msgs.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

function addAgentActivity(agentIdx, status = 'running') {
  const a = AGENTS[agentIdx];
  const msgs = document.getElementById('messages');
  const id = `activity-${agentIdx}`;

  // Update or add
  let existing = document.getElementById(id);
  if (!existing) {
    const div = document.createElement('div');
    div.id = id;
    div.className = 'agent-activity';
    msgs.appendChild(div);
  }
  const el = document.getElementById(id);
  el.innerHTML = `
    <div class="activity-icon">${a.emoji}</div>
    <div class="activity-text">
      <div class="activity-label">${a.label} Agent</div>
      <div class="activity-detail">${status === 'running' ? a.activityText : status === 'done' ? 'Completed successfully' : 'Processing…'}</div>
    </div>
    <div class="activity-status ${status === 'running' ? 'status-running' : 'status-done'}">
      ${status === 'running' ? '<div class="dot-spinner"></div> Running' : '✓ Done'}
    </div>
  `;
  scrollToBottom();
}

function addStageDivider(label) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'stage-divider';
  div.innerHTML = `<div class="stage-label">${label}</div>`;
  msgs.appendChild(div);
}

// ═══════════════════════════════════════════════
//  INPUT HANDLING
// ═══════════════════════════════════════════════
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addUserMessage(text);
  handleUserInput(text);
}

async function handleUserInput(text) {
  if (briefReady) return; // pipeline running, ignore input

  isLoading = true;
  setInputDisabled(true);

  conversationHistory.push({ role: 'user', content: text });
  addTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: AGENTS[0].systemPrompt,
        messages: conversationHistory
      })
    });
    const data = await response.json();
    const reply = data.content?.map(b => b.text || '').join('') || 'Something went wrong. Please try again.';

    removeTyping();
    conversationHistory.push({ role: 'assistant', content: reply });

    if (reply.includes('##BRIEF_READY##')) {
      // Clean message to show user
      const cleanMsg = reply.replace('##BRIEF_READY##', '').trim();
      pipelineData.brief = conversationHistory.map(m => `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}`).join('\n\n');
      addBotMessage(formatMsg(cleanMsg));
      briefReady = true;
      setInputDisabled(true);
      updateNavBadge('Pipeline running…');
      setPipelineStepDone(0);
      setTimeout(() => runBackgroundPipeline(), 1200);
    } else {
      addBotMessage(formatMsg(reply));
      isLoading = false;
      setInputDisabled(false);
    }
  } catch (err) {
    removeTyping();
    addBotMessage(`⚠️ Something went wrong: ${err.message}`);
    isLoading = false;
    setInputDisabled(false);
  }
}

// ═══════════════════════════════════════════════
//  BACKGROUND PIPELINE
// ═══════════════════════════════════════════════
async function runBackgroundPipeline() {
  // Agent 1: Prompt Builder
  await runAgent(1,
    `Here is the user's web design brief:\n\n${pipelineData.brief}\n\nPlease structure this into an optimised prompt.`,
    (reply) => {
      pipelineData.prompt = reply;
      const userMsg = extractSection(reply, 'USER_MESSAGE');
      addStageDivider('Prompt Built');
      addBotMessage(formatMsg(userMsg || 'Your brief has been structured and is now going through compliance checks.'));
    }
  );

  // Agent 2: Compliance
  await runAgent(2,
    `Structured prompt:\n${pipelineData.prompt}\n\nOriginal brief:\n${pipelineData.brief}\n\nPlease run compliance checks.`,
    (reply) => {
      pipelineData.compliance = reply;
      const checks = extractChecks(reply);
      const score = extractScore(reply);
      const userMsg = extractSection(reply, 'USER_MESSAGE');

      addStageDivider('Compliance Check');
      // Show result card
      const msgs = document.getElementById('messages');
      const botDiv = document.createElement('div');
      botDiv.className = 'bot-msg';
      botDiv.innerHTML = `
        <div class="bot-avatar">✦</div>
        <div class="bot-body">
          <div class="bot-name">Pfizer Accelerator</div>
          <div class="bot-bubble">
            ${formatMsg(userMsg || 'Compliance checks are complete.')}
            <div class="result-card">
              <div class="result-title">🛡️ Compliance Results</div>
              ${checks.map(c => `<div class="result-row"><span class="ri">${c.icon}</span><span class="rt"><strong>${c.name}</strong> — ${c.detail}</span></div>`).join('')}
              ${score !== null ? `<div class="score-pill ${score>=80?'good':score>=60?'ok':'bad'}">${score>=80?'✓':'⚠'} ${score}/100 Compliance Score</div>` : ''}
            </div>
          </div>
        </div>
      `;
      msgs.appendChild(botDiv);
      scrollToBottom();
    }
  );

  // Agent 3: Grammar & Brand
  await runAgent(3,
    `Brief:\n${pipelineData.brief}\n\nStructured prompt:\n${pipelineData.prompt}\n\nPlease check grammar and brand voice.`,
    (reply) => {
      pipelineData.grammar = reply;
      const brandScore = extractNamedScore(reply, 'BRAND_SCORE');
      const suggestions = extractSuggestions(reply);
      const userMsg = extractSection(reply, 'USER_MESSAGE');

      addStageDivider('Grammar & Brand');
      const msgs = document.getElementById('messages');
      const botDiv = document.createElement('div');
      botDiv.className = 'bot-msg';
      botDiv.innerHTML = `
        <div class="bot-avatar">✦</div>
        <div class="bot-body">
          <div class="bot-name">Pfizer Accelerator</div>
          <div class="bot-bubble">
            ${formatMsg(userMsg || 'Grammar and brand checks are complete.')}
            <div class="result-card">
              <div class="result-title">✍️ Grammar &amp; Brand</div>
              ${brandScore !== null ? `<div class="result-row"><span class="ri">🎯</span><span class="rt"><strong>Brand Score</strong> — ${brandScore}/100</span></div>` : ''}
              ${suggestions.map(s => `<div class="result-row"><span class="ri">💡</span><span class="rt">${s}</span></div>`).join('')}
              ${brandScore !== null ? `<div class="score-pill ${brandScore>=80?'good':brandScore>=60?'ok':'bad'}">${brandScore>=80?'✓':'⚠'} ${brandScore}/100 Brand Voice Score</div>` : ''}
            </div>
          </div>
        </div>
      `;
      msgs.appendChild(botDiv);
      scrollToBottom();
    }
  );

  // Agent 4: Final Review
  await runAgent(4,
    `BRIEF:\n${pipelineData.brief}\n\nPROMPT:\n${pipelineData.prompt}\n\nCOMPLIANCE:\n${pipelineData.compliance}\n\nGRAMMAR:\n${pipelineData.grammar}\n\nProduce the final delivery report.`,
    (reply) => {
      pipelineData.final = reply;
      const overallScore = extractNamedScore(reply, 'OVERALL_SCORE') || extractScore(reply);
      const verdict = reply.includes('READY FOR LAUNCH') ? 'READY FOR LAUNCH' : 'REQUIRES REVISIONS';
      const actions = extractActionItems(reply);
      const userMsg = extractSection(reply, 'USER_MESSAGE');

      addStageDivider('Final Delivery Report');
      const msgs = document.getElementById('messages');

      // Complete banner
      const bannerDiv = document.createElement('div');
      bannerDiv.className = 'complete-banner';
      bannerDiv.innerHTML = `
        <div class="icon">${verdict === 'READY FOR LAUNCH' ? '🚀' : '🔧'}</div>
        <div>
          <h3>${verdict === 'READY FOR LAUNCH' ? 'Ready for Launch!' : 'Revisions Needed'}</h3>
          <p>Overall Score: ${overallScore !== null ? overallScore + '/100' : '—'} · ${actions.length} action item${actions.length !== 1 ? 's' : ''} identified</p>
        </div>
      `;
      msgs.appendChild(bannerDiv);

      // Result card with actions
      const botDiv = document.createElement('div');
      botDiv.className = 'bot-msg';
      botDiv.innerHTML = `
        <div class="bot-avatar">✦</div>
        <div class="bot-body">
          <div class="bot-name">Pfizer Accelerator</div>
          <div class="bot-bubble">
            ${formatMsg(userMsg || 'Your pipeline is complete!')}
            ${actions.length ? `<div class="result-card">
              <div class="result-title">🔧 Action Items</div>
              ${actions.map((a,i) => `<div class="result-row"><span class="ri">${i+1}.</span><span class="rt">${a}</span></div>`).join('')}
            </div>` : ''}
            <div class="quick-replies">
              <button class="qr-chip primary" onclick="restartPipeline()">🔄 Start a new project</button>
            </div>
          </div>
        </div>
      `;
      msgs.appendChild(botDiv);
      scrollToBottom();
      updateNavBadge(verdict === 'READY FOR LAUNCH' ? '✓ Ready for launch' : '⚠ Revisions needed');
    }
  );
}

async function runAgent(agentIdx, prompt, onComplete) {
  setPipelineStepRunning(agentIdx);
  addAgentActivity(agentIdx, 'running');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: AGENTS[agentIdx].systemPrompt,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    const reply = data.content?.map(b => b.text || '').join('') || '';

    addAgentActivity(agentIdx, 'done');
    setPipelineStepDone(agentIdx);
    await sleep(600);
    onComplete(reply);
    await sleep(800);
  } catch (err) {
    addAgentActivity(agentIdx, 'done');
    setPipelineStepDone(agentIdx);
    addBotMessage(`⚠️ Agent error: ${err.message}`);
  }
}

// ═══════════════════════════════════════════════
//  PIPELINE STEP STATES
// ═══════════════════════════════════════════════
function setPipelineStepDone(idx) {
  const el = document.getElementById(`ps-${idx}`);
  if (!el) return;
  el.className = 'pipeline-step done';
  el.querySelector('.step-circle').innerHTML = `✓<div class="step-spinner"></div>`;
}

function setPipelineStepRunning(idx) {
  const el = document.getElementById(`ps-${idx}`);
  if (!el) return;
  el.className = 'pipeline-step running active';
}

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function extractSection(text, key) {
  const match = text.match(new RegExp(`${key}:\\s*([\\s\\S]*?)(?=\\n[A-Z_]+:|$)`));
  return match ? match[1].trim() : null;
}

function extractScore(text) {
  const m = text.match(/SCORE:\s*(\d+)\/100/);
  return m ? parseInt(m[1]) : null;
}

function extractNamedScore(text, key) {
  const m = text.match(new RegExp(`${key}:\\s*(\\d+)\\/100`));
  return m ? parseInt(m[1]) : null;
}

function extractChecks(text) {
  const lines = text.split('\n').filter(l => /^[✅⚠️❌]/.test(l.trim()));
  return lines.map(l => {
    const icon = l.trim()[0];
    const rest = l.trim().slice(1).trim();
    const [name, ...detail] = rest.split(':');
    return { icon, name: name?.trim() || '', detail: detail.join(':').trim() };
  });
}

function extractSuggestions(text) {
  const match = text.match(/TOP_SUGGESTIONS:\s*([\s\S]*?)(?=\n[A-Z_]+:|$)/);
  if (!match) return [];
  return match[1].trim().split('\n').filter(l => l.trim()).map(l => l.replace(/^\d+\.\s*/, '').trim());
}

function extractActionItems(text) {
  const match = text.match(/ACTION_ITEMS:\s*([\s\S]*?)(?=\nVERDICT:|$)/);
  if (!match) return [];
  return match[1].trim().split('\n').filter(l => l.trim()).map(l => l.replace(/^\d+\.\s*/, '').trim());
}

function formatMsg(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(.+)$/, '<p>$1</p>');
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollToBottom() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function setInputDisabled(val) {
  document.getElementById('userInput').disabled = val;
  document.getElementById('sendBtn').disabled = val;
  if (val) {
    document.getElementById('userInput').placeholder = briefReady ? 'Pipeline is running…' : 'Waiting for response…';
  } else {
    document.getElementById('userInput').placeholder = 'Type your message here…';
  }
}

function updateNavBadge(text) {
  document.getElementById('navBadge').textContent = text;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function restartPipeline() {
  location.reload();
}
</script>
